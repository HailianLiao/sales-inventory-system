{% extends "base.html" %}
{% block title %}采购订单分析{% endblock %}
{% block page_subtitle %}采购订单分析{% endblock %}
{% block content %}
<h4 class="mb-4">采购订单分析</h4>
<p class="text-muted">输入拟采购 SKU 和数量，系统将基于历史数据进行多维分析</p>
<div class="chart-box mb-4">
    <div class="row g-3 mb-3">
        <div class="col-md-4"><label class="form-label">物料编码</label><input type="text" class="form-control" id="poSku" placeholder="输入物料编码"></div>
        <div class="col-md-4"><label class="form-label">拟采购数量</label><input type="number" class="form-control" id="poQty" value="0"></div>
        <div class="col-md-4 d-flex align-items-end"><button class="btn btn-primary" id="btnPo"><i class="bi bi-cart-check"></i> 分析</button></div>
    </div>
    <div id="poResult"></div>
</div>
<div class="chart-box">
    <div class="chart-title">批量采购分析</div>
    <form id="batchForm" enctype="multipart/form-data">
        <div class="row g-3">
            <div class="col-md-6"><input class="form-control" type="file" id="batchFile" accept=".xlsx,.xls,.csv"></div>
            <div class="col-md-3"><button type="submit" class="btn btn-outline-primary">上传并分析</button></div>
        </div>
        <small class="text-muted">文件需包含"物料编码"和"采购数量"列</small>
    </form>
    <div id="batchResult" class="mt-3"></div>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.getElementById("btnPo").addEventListener("click", function() {
    var sku = $("#poSku").val(); if (!sku) return;
    apiPost("/api/purchase-analysis", { sku: sku, quantity: +$("#poQty").val() }, function(err, data) {
        if (err) { alert(err); return; }
        var html = '<div class="row g-3 mb-3">';
        var metrics = [["近3月月均销量","近3月月均销量"],["近6月月均销量","近6月月均销量"],["当前库存","当前库存"],["未交订单","未交订单"],["拟采购数量","拟采购数量"],["预估可售月数","预估可售月数"]];
        metrics.forEach(function(m) { html += '<div class="col-md-2"><div class="stat-card"><div class="stat-label">' + m[0] + '</div><div class="stat-value">' + fmtNum(data[m[1]]) + '</div></div></div>'; });
        html += '</div>';
        if (data.trend && data.trend.length) { html += '<div id="poChart" style="height:350px;"></div>'; }
        $("#poResult").html(html);
        if (data.trend && data.trend.length) {
            renderChart("poChart", { tooltip:{trigger:"axis"}, xAxis:{type:"category",data:data.trend.map(d=>d["年月"]),axisLabel:{rotate:45}}, yAxis:{type:"value"}, series:[{name:"销量",type:"line",data:data.trend.map(d=>d["销量"]),smooth:true,itemStyle:{color:"#8b5cf6"}}] });
        }
    });
});
</script>
{% endblock %}
